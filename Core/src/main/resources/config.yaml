##################################################
################ General Settings ################
##################################################

bot_token: "YOUR_BOT_TOKEN_HERE"

# Set to false to use a standalone MongoDB instance
database:
  embedded: true
  connection_string: "mongodb://localhost:27017"
  port: 27017
  data_path: "mongodb-data"

# Bot status cycling
status_changer:
  # PLAYING / STREAMING / LISTENING / WATCHING / CUSTOM_STATUS / COMPETING
  activities:
    - "COMPETING;開發中...;5000"
    - "COMPETING;Developing...;5000"

# Console logging to Discord channels
console_loggers:
  - guild_id: 0
    channel_id: 0
    log_types: [ "command", "button", "modal" ]
    format: "[%cl_type%] %user_name% `%cl_interaction_string%`"

# Interaction handling
auto_defer_replies: true
